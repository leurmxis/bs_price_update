name: Mission

on:
  schedule:
    - cron: '05 12 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v5

    - name: set env
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: req
      run: |
        pip install akshare pandas pyarrow pytz baostock

    - name: run
      run: python data.py

    - name: 提交并推送数据文件
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Auto update stock data: $(date +'%Y-%m-%d')" || exit 0
        git push
